<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Messenger - Безопасный чат</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hero-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(135deg, #FFF9C4 0%, #FFE0B2 33%, #E1BEE7 66%, #ffffff 100%);
        }
        
        .hero-content {
            max-width: 800px;
            width: 100%;
        }
        
        h1.hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #BA68C8, #FFB74D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }
        
        .hero-subtitle {
            font-size: 1.5rem;
            color: #795548;
            margin-bottom: 2.5rem;
            font-weight: 300;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .cta-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
        }
        
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            text-align: center;
            min-width: 250px;
        }
        
        .btn i {
            margin-right: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #FFB74D, #BA68C8);
            color: white;
            box-shadow: 0 10px 30px rgba(186, 104, 200, 0.2);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(186, 104, 200, 0.3);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.9);
            color: #BA68C8;
            border: 2px solid #E1BEE7;
        }
        
        .btn-secondary:hover {
            background: #E1BEE7;
            color: white;
        }
        
        @media (max-width: 768px) {
            h1.hero-title {
                font-size: 2.5rem;
            }
            
            .hero-subtitle {
                font-size: 1.2rem;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title">
                <i class="fas fa-lock"></i> Secure Messenger
            </h1>
            
            <p class="hero-subtitle">
                End-to-end шифрование, защищенные каналы связи 
                и полная конфиденциальность ваших переписок
            </p>
            
            <div class="cta-container">
                <a href="/register" class="btn btn-primary">
                    <i class="fas fa-user-plus"></i> Начать бесплатно
                </a>
                
                <a href="/login" class="btn btn-secondary">
                    <i class="fas fa-sign-in-alt"></i> Войти в аккаунт
                </a>
            </div>
            
            <div style="margin-top: 40px; color: #795548; font-size: 0.9rem;">
                <p>Безопасный обмен сообщениями | Шифрование AES-256 | Реальное время</p>
            </div>
        </div>
    </div>
</body>
</html>
